<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  <!-- Main brick body (Isometric Cube) -->
  <!-- Outline -->
  <path d="M 12,11 L 19,15 V 21 L 12,25 L 5,21 V 15 Z" stroke-width="2" />
  <!-- Top face front edges -->
  <path d="M 5,15 L 12,19 L 19,15" />
  <!-- Center vertical edge -->
  <line x1="12" y1="19" x2="12" y2="25" />

  <!-- Lego Stud (Connector pin) on top of the block -->
  <!-- Outer cylinder sides & bottom curve -->
  <path d="M 9,11.3 V 13 A 3,1.5 0 0 0 15,13 V 11.3" />
  <!-- Top face of the stud -->
  <ellipse cx="12" cy="11.3" rx="3" ry="1.5" />
</svg>
