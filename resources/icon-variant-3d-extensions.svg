<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  <!-- 1. Bottom Left Isometric Cube -->
  <g>
    <path d="M 5,12.7 L 8.5,14.5 V 18 L 5,19.8 L 1.5,18 V 14.5 Z" />
    <path d="M 1.5,14.5 L 5,16.3 L 8.5,14.5" />
    <line x1="5" y1="16.3" x2="5" y2="19.8" />
  </g>

  <!-- 2. Bottom Right Isometric Cube -->
  <g>
    <path d="M 19,12.7 L 22.5,14.5 V 18 L 19,19.8 L 15.5,18 V 14.5 Z" />
    <path d="M 15.5,14.5 L 19,16.3 L 22.5,14.5" />
    <line x1="19" y1="16.3" x2="19" y2="19.8" />
  </g>

  <!-- 3. Bottom Front Isometric Cube -->
  <g>
    <path d="M 12,16.2 L 15.5,18 V 21.5 L 12,23.3 L 8.5,21.5 V 18 Z" />
    <path d="M 8.5,18 L 12,19.8 L 15.5,18" />
    <line x1="12" y1="19.8" x2="12" y2="23.3" />
  </g>

  <!-- 4. Dotted connection/drop line -->
  <path d="M 12,10.5 V 14.5" stroke-dasharray="1.5 1.5" stroke-width="1.2" />

  <!-- 5. Top Floating Isometric Cube (The Plugin) -->
  <g>
    <path d="M 12,4.2 L 15.5,6 V 9.5 L 12,11.3 L 8.5,9.5 V 6 Z" stroke-width="2" />
    <path d="M 8.5,6 L 12,7.8 L 15.5,6" />
    <line x1="12" y1="7.8" x2="12" y2="9.5" />
  </g>
</svg>
