<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  <!-- Cube (Module) in the top-left -->
  <rect x="4" y="4" width="10" height="10" rx="2" />
  
  <!-- Dashed connection line from module to switch -->
  <path d="M 9,14 V 16.5 H 11.5" stroke-dasharray="1.5 1.5" stroke-width="1.2" />
  
  <!-- Toggle Switch (Controller) in the bottom-right -->
  <g transform="translate(11.5, 13.5)">
    <rect x="0" y="0" width="8.5" height="5.5" rx="2.75" />
    <circle cx="5.75" cy="2.75" r="1.3" fill="currentColor" />
  </g>
</svg>
