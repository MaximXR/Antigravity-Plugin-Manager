<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  <!-- Three standard base blocks of the plugin grid -->
  <rect x="4" y="4" width="7" height="7" rx="1.5" />
  <rect x="4" y="13" width="7" height="7" rx="1.5" />
  <rect x="13" y="13" width="7" height="7" rx="1.5" />
  
  <!-- The fourth module, represented as a Toggle Switch in the 'ON' state -->
  <g transform="translate(13, 4)">
    <!-- The outer capsule of the toggle -->
    <rect x="0.5" y="1.25" width="6.5" height="4.5" rx="2.25" />
    <!-- The toggle slider knob (filled in active state) -->
    <circle cx="5" cy="3.5" r="1.1" fill="currentColor" />
  </g>
</svg>
