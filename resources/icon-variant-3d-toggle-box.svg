<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  <!-- Isometric Cube Module Body -->
  <!-- Outline -->
  <path d="M 12,11 L 19,15 V 21 L 12,25 L 5,21 V 15 Z" />
  <!-- Top face front edges -->
  <path d="M 5,15 L 12,19 L 19,15" />
  <!-- Center vertical edge -->
  <line x1="12" y1="19" x2="12" y2="25" />

  <!-- Toggle Switch Lever sticking out from the top face -->
  <!-- Lever base ring -->
  <ellipse cx="12" cy="15" rx="2" ry="1" />
  <!-- Lever shaft pointing up-right (active switch position) -->
  <line x1="12" y1="15" x2="15.5" y2="8" stroke-width="2.5" />
  <!-- Lever knob ball at the tip -->
  <circle cx="15.5" cy="8" r="1.3" fill="currentColor" />
</svg>
