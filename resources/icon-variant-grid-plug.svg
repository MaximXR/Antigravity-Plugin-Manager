<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  <!-- Three standard base blocks -->
  <rect x="4" y="4" width="7" height="7" rx="1.5" />
  <rect x="4" y="13" width="7" height="7" rx="1.5" />
  <rect x="13" y="13" width="7" height="7" rx="1.5" />
  <!-- The fourth offset block, styled as a modular plug -->
  <g transform="translate(13, 2)">
    <rect x="1.5" y="2.5" width="6" height="6" rx="1.2" stroke-width="2" />
    <line x1="3.5" y1="2.5" x2="3.5" y2="0.5" stroke-width="1.5" />
    <line x1="5.5" y1="2.5" x2="5.5" y2="0.5" stroke-width="1.5" />
  </g>
</svg>
